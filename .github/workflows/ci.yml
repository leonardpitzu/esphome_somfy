name: CI

on:
  push:
    branches: [main, master]
    paths-ignore: ["**.md", ".gitignore", "LICENSE"]
  pull_request:
    paths-ignore: ["**.md", ".gitignore", "LICENSE"]
  schedule:
    # Weekly build to catch breakage from ESPHome updates
    - cron: "0 6 * * 1"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ruff:
    name: Lint (Ruff)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install ruff
      - name: Check for errors
        run: ruff check .

  tests:
    name: Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements_test.txt
      - name: Install test dependencies
        run: pip install -r requirements_test.txt
      - name: Run tests
        run: pytest tests/ -v --cov=components/somfy --cov-report=term-missing

  esphome-compile:
    name: ESPHome Compile (${{ matrix.fixture }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        fixture:
          - test_rts_tx_only
          - test_rts_rx
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install ESPHome
        run: pip install esphome
      - name: Cache PlatformIO
        uses: actions/cache@v6
        with:
          path: ~/.platformio
          key: pio-${{ runner.os }}-${{ hashFiles('components/**') }}
          restore-keys: pio-${{ runner.os }}-
      - name: Compile ${{ matrix.fixture }}
        run: esphome compile tests/fixtures/${{ matrix.fixture }}.yaml
