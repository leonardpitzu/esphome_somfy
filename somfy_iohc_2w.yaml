substitutions:
  devicename: shades-iohc-2w
  devicelabel: Shades iohc 2W

packages:
  common: !include packages/common.yaml

external_components:
  source: github://leonardpitzu/esphome_somfy@main
  components: [somfy]
  refresh: 600s

logger:
  level: DEBUG

esphome:
  name: $devicename
  comment: $devicelabel

esp32:
  variant: esp32s3

web_server:
  port: 80
  log: false
  local: true
  version: 3

spi:
  clk_pin: GPIO07
  mosi_pin: GPIO09
  miso_pin: GPIO08

# CC1101 configured for io-homecontrol (868 MHz, 2-FSK)
# The somfy iohc component will auto-configure modulation parameters.
cc1101:
  id: cc1101_radio
  cs_pin: GPIO6
  gdo0_pin: GPIO04
  frequency: 868.95MHz
  modulation_type: 2-FSK
  symbol_rate: 38400
  fsk_deviation: 19.2kHz
  filter_bandwidth: 100kHz
  manchester: false
  packet_mode: true
  packet_length: 0
  crc_enable: false
  sync_mode: "16/16"
  sync1: 0xFF
  sync0: 0x33
  num_preamble: 4

somfy:
  - id: iohc_radio
    type: iohc
    cc1101_id: cc1101_radio

button:
  - platform: template
    id: "program_living_room_blind"
    name: "Prog Living Room Blind"
    entity_category: config

# Optional: shows the ID + command of any io-homecontrol remote heard on air,
# so you can learn the IDs of the physical remotes paired with your motor.
text_sensor:
  - platform: template
    id: somfy_iohc_rx_last
    name: "Detected iohc Remote"

cover:
  - platform: somfy
    type: iohc
    id: living_room_blind
    name: "Living Room Blind"
    device_class: shutter
    open_duration: 25s
    close_duration: 25s
    storage_key: KeyLivBlind
    remote_code: 0xAABBCC
    prog_button: program_living_room_blind
    somfy_id: iohc_radio
    mode: 2w
    target_node: 0xDEADBE
    encryption_key: "YOUR_SYSTEM_KEY_HEX_32_CHARS_HERE"
    # RX state-sync: keep HA in sync when the motor is driven by an original remote.
    detected_remote: somfy_iohc_rx_last
    allowed_remotes:
      - 0x112233
